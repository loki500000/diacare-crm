; ──────────────────────────────────────────────────────────────────────────────
; Generic CRM Dialplan for Asterisk AVA
;
; Works with ANY CRM — just change CRM_LOOKUP_URL + CRM_WEBHOOK_URL in AVA .env
;
; Add this to /etc/asterisk/extensions_custom.conf (FreePBX) or
; /etc/asterisk/extensions.conf then reload:
;   asterisk -rx "dialplan reload"
; ──────────────────────────────────────────────────────────────────────────────

; ── Inbound: caller rings the business ───────────────────────────────────────
; In FreePBX: Inbound Route → Custom Destination → crm-inbound,s,1

[crm-inbound]
exten => s,1,NoOp(CRM inbound from ${CALLERID(num)})
 same => n,Set(AI_CONTEXT=crm-agent)
 same => n,Stasis(asterisk-ai-voice-agent)
 same => n,Hangup()

; ── Outbound: CRM triggers a call via ARI originate ──────────────────────────
; AVA sends appArgs=crm-agent which sets AI_CONTEXT automatically.
; Your outbound trunk/route must be configured in Asterisk/FreePBX separately.

[crm-outbound]
exten => _X.,1,NoOp(CRM outbound to ${EXTEN})
 same => n,Set(AI_CONTEXT=crm-agent)
 same => n,Stasis(asterisk-ai-voice-agent)
 same => n,Hangup()
